services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: flowclass
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      # Named volume persists data across container restarts. Data is only removed with: docker compose down -v
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -q"]
      interval: 2s
      timeout: 5s
      retries: 10

  smtp:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    restart: unless-stopped
    ports:
      - "3101:8978"
    volumes:
      - cloudbeaver-data:/opt/cloudbeaver/workspace
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      - postgres
      - smtp
    environment:
      NODE_ENV: development
      APP_PORT: 3100
      API_BASE_URL: http://localhost:3100
      NEXT_PUBLIC_WEB_BASE_URL: http://localhost:3001
      FILE_UPLOAD_LOCATION: /workspace/uploads
      FILE_UPLOAD_MAX_FILE_SIZE: 10485760
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: flowclass
      DATABASE_SSL: "false"
      SMTP_HOST: smtp
      SMTP_PORT: 1025
      SMTP_SECURE: "false"
      SMTP_USER: ""
      SMTP_PASS: ""
      MAIL_ENCRYPTION: tls
      MAIL_FROM_ADDRESS: no-reply@localhost
      MAIL_FROM_NAME: Flowclass OSS
      JWT_SECRET: local-jwt-secret
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_SECRET: local-jwt-refresh-secret
      JWT_REFRESH_EXPIRES_IN: 30d
      JWT_SECRET_STUDENT: local-jwt-student-secret
      STRIPE_SECRET_KEY: local-stripe-secret
      STRIPE_ENDPOINT_SECRET: local-stripe-webhook-secret
      # Required for Divit payment encryption. Generate with: openssl rand -hex 32
      DIVIT_ENCRYPTION_KEY: ""
      # Required for testing Divit webhook callbacks. Must be a publicly reachable URL (e.g. an ngrok tunnel).
      # Leave empty if not using Divit payments or it will use the default API_BASE_URL.
      DIVIT_WEBHOOK_BASE_URL: ""
      SWAGGER_ENABLED: "true"
    ports:
      - "3100:3100"
    volumes:
      # Named volume persists uploaded media across container restarts. Data is only removed with: docker compose down -v
      - media-data:/workspace/uploads

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_WEB_BASE_URL: http://localhost:3001
    restart: unless-stopped
    depends_on:
      - api
    environment:
      PORT: 3001
      NEXT_PUBLIC_WEB_BASE_URL: http://localhost:3001
    ports:
      - "3001:3001"

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        VITE_ADMIN_BASE_URL: http://localhost:3000
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  postgres-data:
  media-data:
  cloudbeaver-data:
