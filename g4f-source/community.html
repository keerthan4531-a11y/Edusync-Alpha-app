<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G4F - Community</title>
    <link rel="icon" href="dist/img/g4f.svg" type="image/svg+xml">
    <style>
        :root {
            --primary: #6e48aa;
            --dark: #1a1a2e;
            --light: #f8f9fa;
            --discord: #5865F2;
            --danger: #ff6b6b;
        }
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--dark), #16213e);
            color: var(--light);
            margin: 0;
            padding: 2rem;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .post-form {
            background: rgba(255, 255, 255, 0.1);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 2rem;
        }
        textarea {
            width: 100%;
            min-height: 100px;
            resize: vertical;
            background: rgba(0, 0, 0, 0.2);
            color: white;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 0.75rem;
            margin-bottom: 0.75rem;
            font: inherit;
        }
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.3rem 0.5rem;
            border-radius: 4px;
            cursor: pointer;
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .post {
            background: rgba(255, 255, 255, 0.05);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            position: relative;
        }
        .post p {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-word;
            padding-right: 5.5rem;
        }
        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--discord);
            font-size: 0.8rem;
        }
        .status {
            margin: 0 0 1rem;
        }
        .error {
            color: var(--danger);
        }
        .muted {
            opacity: 0.8;
        }
        a {
            color: var(--primary);
            text-decoration: none;
        }
    </style>
    <script src="dist/js/router.js"></script>
</head>
<body>
    <div class="container">
        <h1>Community Forum</h1>
        <p>Join our community: <a href="https://discord.gg/qXA4Wf4Fsm" target="_blank" style="color: var(--discord);">discord.gg/qXA4Wf4Fsm</a></p>
        <div id="loginStatus" class="status"></div>
        <div class="post-form" id="postForm" style="display: none;">
            <textarea id="postContent" placeholder="Ask a question or post to the Community..."></textarea>
            <button id="postButton" type="button">Post</button>
        </div>
        <div id="posts" class="muted">Loading posts...</div>
    </div>

    <script>
        const { getUser, getCurrentUrl, handleRedirectCallback } = MembersAuth;
        const loginStatus = document.getElementById('loginStatus');
        const postForm = document.getElementById('postForm');
        const postContent = document.getElementById('postContent');
        const postButton = document.getElementById('postButton');
        const postsContainer = document.getElementById('posts');

        let userData = null;
        (async () => {
            await handleRedirectCallback();

            try {
                userData = getUser();
            } catch (e) {
                console.error('Failed to get user data', e);
            }

            if (userData && userData.username) {
                loginStatus.textContent = `Logged in as ${userData.username}`;
                postForm.style.display = 'block';
            } else {
                loginStatus.innerHTML = `<p><a href="members.html?redirect=${encodeURIComponent(getCurrentUrl())}" target="_blank">Login to post</a></p>`;
            }
        })();

        function escapeHtml(value) {
            return String(value).replace(/[&<>'"]/g, function (char) {
                return {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#39;'
                }[char];
            });
        }

        function renderMarkdown(text) {
            if (!text) return '';
            let html = escapeHtml(text);
            // 1. Inline code (Must be first to prevent parsing markdown inside code blocks)
            html = html.replace(/`([^`]+)`/g, '<code class="inline-code">$1</code>');
            // 2. Videos (Added support for webm/ogg/mov, and changed invalid 'alt' to 'title')
            html = html.replace(
                /!\[([^\]]*)\]\(([^)]+\.(?:mp4|webm|ogg|mov))\)/gi, 
                '<video src="$2" title="$1" autoplay muted controls style="max-width: 100%; max-height: 400px; margin: 10px 0;"></video>'
            );
            // 3. Images
            html = html.replace(
                /!\[([^\]]*)\]\(([^)]+)\)/g, 
                '<img src="$2" alt="$1" style="max-width: 100%; max-height: 400px; margin: 10px 0;">'
            );
            // 4. Bold (Added boundary checks to prevent matching inside other symbols)
            html = html.replace(
                /(?<=^|\s)\*\*(.+?)\*\*(?=[\s.,!?;:]|$)/g, 
                '<strong>$1</strong>'
            );
            // 5. Italic (Added boundary checks so it doesn't break **bold** or a*b*c)
            html = html.replace(
                /(?<=^|\s)\*(?!\*)(.+?)\*(?=[\s.,!?;:]|$)/g, 
                '<em>$1</em>'
            );
            // 6. URLs (Added lookbehind to prevent breaking HTML attributes like src="url")
            html = html.replace(
                /(^|[\<\s])\b(https?:\/\/[^\s<>"'()[\]{}|\\^`]+)\b/g,
                (match, p1, p2) => `${p1}<a href="${p2}" target="_blank" rel="noopener noreferrer">${p2}</a>`
            );

            return html;
        }

        async function fetchPosts() {
            postsContainer.textContent = 'Loading posts...';

            try {
                const response = await fetch('https://discord.g4f.space/');
                if (!response.ok) {
                    throw new Error(`Failed to load posts (${response.status})`);
                }

                const messages = await response.json();
                postsContainer.innerHTML = '';

                if (!Array.isArray(messages) || messages.length === 0) {
                    postsContainer.innerHTML = '<p class="muted">No posts yet.</p>';
                    return;
                }

                messages.forEach((message) => {
                    const post = document.createElement('div');
                    post.className = 'post';

                    const author = escapeHtml(message.author || 'Unknown');
                    let content = message.content || '';
                    const match = message.content.match(/\#report:([^:\s]+):([^\s]+)$/);
                    console.log('Report match:', match);
                    if (match) {
                        content = content.split(match[0])[0].trim(); // Remove report tag from content
                    }
                    content = renderMarkdown(content);

                    post.innerHTML = `
                        <strong>${author}</strong>
                        <p>${content}</p>
                        <button class="copy-btn" type="button">Copy</button>
                        ${match ? `<button class="report-btn" type="button" style="position: absolute; bottom: 10px; right: 10px; background: var(--danger); font-size: 0.8rem;">Report</button>` : ''}
                    `;

                    const reportBtn = post.querySelector('.report-btn');
                    reportBtn?.addEventListener('click', async () => {
                        const reason = prompt("Please enter the reason for reporting this post:");
                        if (!reason) return;
                        
                        try {
                            const response = await fetch('https://discord.g4f.space/report', {
                                method: 'PUT',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ provider: match[1], username: match[2], reason })
                            });
                            if (response.ok) {
                                alert('Report submitted successfully.');
                            } else {
                                alert('Failed to submit report.');
                            }
                        } catch (err) {
                            console.error('Report error', err);
                            alert('Failed to submit report.');
                        }
                    });

                    const copyBtn = post.querySelector('.copy-btn');
                    copyBtn.addEventListener('click', async () => {
                        try {
                            await navigator.clipboard.writeText(message.content || '');
                            copyBtn.textContent = 'Copied';
                            setTimeout(() => {
                                copyBtn.textContent = 'Copy';
                            }, 1200);
                        } catch (err) {
                            console.error('Clipboard error', err);
                            alert('Failed to copy post content.');
                        }
                    });

                    postsContainer.appendChild(post);
                });
            } catch (error) {
                console.error(error);
                postsContainer.innerHTML = `<p class="error">${escapeHtml(error.message || 'Failed to load posts.')}</p>`;
            }
        }

        async function addPost() {
            const content = postContent.value.trim();
            if (!content || !localStorage.getItem('g4f_session')) {
                return;
            }

            postButton.disabled = true;
            postButton.textContent = 'Posting...';

            try {
                const session = localStorage.getItem('g4f_session');
                if (!session) {
                    throw new Error('You are not authenticated. Please log in again.');
                }

                const jwtResponse = await fetch('https://auth.g4f.space/members/api/jwt', {
                    headers: {
                        Authorization: `Bearer ${session}`
                    }
                });

                if (!jwtResponse.ok) {
                    throw new Error('Failed to fetch authentication token: ' + await jwtResponse.text());
                }

                const jwtData = await jwtResponse.json();
                if (!jwtData || !jwtData.token) {
                    throw new Error('Authentication token was missing from response.');
                }

                const response = await fetch('https://discord.g4f.space/', {
                    method: 'POST',
                    headers: {
                        Authorization: `Bearer ${jwtData.token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        author: userData.username,
                        content
                    })
                });

                if (!response.ok) {
                    throw new Error(await response.text() || `Posting failed (${response.status})`);
                }

                postContent.value = '';
                await fetchPosts();
            } catch (error) {
                console.error(error);
                alert('Error posting: ' + (error.message || 'Unknown error'));
            } finally {
                postButton.disabled = false;
                postButton.textContent = 'Post';
            }
        }

        postButton.addEventListener('click', addPost);
        postContent.addEventListener('keydown', (event) => {
            if ((event.ctrlKey || event.metaKey) && event.key === 'Enter') {
                addPost();
            }
        });

        fetchPosts();
    </script>
</body>
</html>
